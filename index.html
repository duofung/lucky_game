<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>幸运轮盘</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div class="brand-block brand-panel glass-panel">
          <div class="brand-mark">
            <span class="brand-mark-ring"></span>
            <span class="brand-mark-core"></span>
          </div>
          <div>
            <div class="brand-kicker" data-i18n="brandKicker">EXHIBITION GAME STUDIO</div>
            <h1 data-i18n="brandTitle">幸运轮盘</h1>
            <p data-i18n="brandSubtitle">适用于线下活动、品牌互动与礼品抽奖。</p>
          </div>
        </div>
        <div class="toolbar lang-toolbar">
          <button class="ghost-chip active" data-lang="zh">中文</button>
          <button class="ghost-chip" data-lang="en">EN</button>
        </div>
      </header>

      <section class="skin-bar">
        <div class="skin-switcher glass-panel">
          <span class="toolbar-label" data-i18n="skinLabel">皮肤切换</span>
          <div class="skin-options">
            <button class="skin-chip active" data-theme="pink" data-i18n="themePink">少女粉</button>
            <button class="skin-chip" data-theme="orange" data-i18n="themeOrange">阳光橙</button>
            <button class="skin-chip" data-theme="blue" data-i18n="themeBlue">天之蓝</button>
            <button class="skin-chip" data-theme="space" data-i18n="themeSpace">科技黑</button>
            <button class="skin-chip" data-theme="klein" data-i18n="themeKlein">克莱因蓝</button>
          </div>
        </div>
      </section>

      <main class="layout">
        <aside class="activity-sidebar glass-panel">
          <div class="section-label" data-i18n="activityLabel">游戏列表</div>
          <nav class="activity-nav">
            <button class="activity-card active" data-activity="wheel">
              <span class="activity-icon">◎</span>
              <span>
                <strong data-i18n="wheelTitle">幸运轮盘</strong>
                <small data-i18n="wheelDesc">礼品、积分、折扣券即时抽取</small>
              </span>
            </button>
            <button class="activity-card" data-activity="blindbox">
              <span class="activity-icon">◈</span>
              <span>
                <strong data-i18n="blindTitle">抽盲盒</strong>
                <small data-i18n="blindDesc">惊喜揭晓式奖励互动</small>
              </span>
            </button>
            <button class="activity-card" data-activity="roulette">
              <span class="activity-icon">✦</span>
              <span>
                <strong data-i18n="rouletteTitle">左轮轮盘赌</strong>
                <small data-i18n="rouletteDesc">戏剧化停顿与刺激感氛围</small>
              </span>
              <em data-i18n="comingSoon">即将上线</em>
            </button>
            <button class="activity-card" data-activity="memory">
              <span class="activity-icon">▦</span>
              <span>
                <strong data-i18n="memoryTitle">九宫格记忆力</strong>
                <small data-i18n="memoryDesc">短时挑战，适合排队与围观</small>
              </span>
              <em data-i18n="comingSoon">即将上线</em>
            </button>
            <button class="activity-card" data-activity="pachinko">
              <span class="activity-icon">◉</span>
              <span>
                <strong data-i18n="pachinkoTitle">幸运弹珠</strong>
                <small data-i18n="pachinkoDesc">适合人流停留的掉落式抽奖</small>
              </span>
              <em data-i18n="comingSoon">即将上线</em>
            </button>
            <button class="activity-card" data-activity="giftwall">
              <span class="activity-icon">▣</span>
              <span>
                <strong data-i18n="giftWallTitle">礼盒翻牌墙</strong>
                <small data-i18n="giftWallDesc">适合多人围观的翻牌揭晓</small>
              </span>
              <em data-i18n="comingSoon">即将上线</em>
            </button>
            <button class="activity-card" data-activity="timer">
              <span class="activity-icon">◌</span>
              <span>
                <strong data-i18n="timerTitle">秒杀倒计时</strong>
                <small data-i18n="timerDesc">适合整点冲刺和限量奖励</small>
              </span>
              <em data-i18n="comingSoon">即将上线</em>
            </button>
          </nav>
        </aside>

        <section class="hero-panel">
          <div class="content-grid">
            <section class="wheel-stage glass-panel activity-panel active" data-panel="wheel">
              <div class="panel-header panel-header-inline">
                <div class="section-label" data-i18n="livePreview">现场预览</div>
                <button id="spinButton" class="primary-button" data-i18n="spinNow">开始抽奖</button>
              </div>

              <div class="wheel-stack">
                <div class="wheel-pointer"></div>
                <div class="wheel-frame">
                  <canvas id="wheelCanvas" width="720" height="720" aria-label="Lucky wheel"></canvas>
                </div>
              </div>

              <div class="stage-footer">
                <div class="current-result">
                  <span data-i18n="nextPrize">当前焦点奖项</span>
                  <strong id="focusedLabel">限定礼盒</strong>
                </div>
                <button id="shuffleButton" class="secondary-button" data-i18n="shuffleOrder">随机排序</button>
              </div>
            </section>

            <section class="blindbox-stage glass-panel activity-panel" data-panel="blindbox">
              <div class="panel-header panel-header-inline">
                <div class="section-label" data-i18n="blindPreview">盲盒礼物墙</div>
                <div class="blindbox-stats">
                  <span id="blindboxStats" data-i18n="blindStatsDefault">已开启 0 / 66</span>
                  <button id="resetBlindboxBoardButton" class="secondary-button" data-i18n="resetRound">重置本轮</button>
                </div>
              </div>

              <div class="blindbox-grid-shell">
                <div id="blindboxGrid" class="blindbox-grid"></div>
              </div>
            </section>

            <section class="editor-panel glass-panel activity-panel active" data-panel="wheel-editor">
              <div class="panel-header panel-header-inline">
                <div class="section-label" data-i18n="editorLabel">玩法编辑</div>
                <button id="addItemButton" class="secondary-button" data-i18n="addItem">新增奖项</button>
              </div>

              <div class="editor-head">
                <span data-i18n="prizeName">奖项名称</span>
                <span data-i18n="prizeWeight">权重</span>
                <span data-i18n="prizeChance">几率</span>
              </div>
              <div id="itemList" class="item-list"></div>

              <div class="editor-actions">
                <button id="toggleChanceButton" class="secondary-button" data-i18n="showChance">显示几率</button>
                <button id="resetButton" class="ghost-button" data-i18n="resetDefault">恢复默认</button>
              </div>
            </section>

            <section class="editor-panel glass-panel activity-panel blindbox-editor" data-panel="blindbox-editor">
              <div class="panel-header panel-header-inline">
                <div class="section-label" data-i18n="blindEditorLabel">盲盒配置</div>
                <button id="generateBlindboxButton" class="primary-button" data-i18n="generateBlindbox">生成盲盒</button>
              </div>

              <div class="blindbox-summary">
                <article>
                  <span data-i18n="boxTotal">总盒子数</span>
                  <strong id="boxTotalValue">66</strong>
                </article>
                <article>
                  <span data-i18n="assignedCount">已分配</span>
                  <strong id="assignedCountValue">66 / 66</strong>
                </article>
                <article>
                  <span data-i18n="remainingCount">剩余</span>
                  <strong id="remainingCountValue">0</strong>
                </article>
              </div>

              <div class="editor-head blindbox-editor-head">
                <span data-i18n="prizeName">奖项名称</span>
                <span data-i18n="blindboxQty">数量</span>
                <span data-i18n="prizeChance">几率</span>
                <span></span>
              </div>
              <div id="blindboxPrizeList" class="item-list blindbox-prize-list"></div>

              <p id="blindboxValidation" class="blindbox-validation" data-i18n="blindboxReady">已达到可生成状态</p>

              <div class="editor-actions blindbox-actions">
                <button id="shuffleBlindboxButton" class="secondary-button" data-i18n="shuffleBlindbox">重新打乱</button>
                <button id="resetBlindboxConfigButton" class="ghost-button" data-i18n="resetBlindboxConfig">恢复盲盒默认</button>
              </div>
            </section>
          </div>
        </section>
      </main>

      <footer class="site-footer">
        <span data-i18n="footerMadeBy">技术支持：价直互联（深圳）展览科技有限公司</span>
      </footer>
    </div>

    <dialog id="resultDialog" class="result-dialog">
      <div class="result-card">
        <div class="result-confetti confetti-left"></div>
        <div class="result-confetti confetti-right"></div>
        <p class="result-tag" data-i18n="congratsTag">抽奖结果</p>
        <h3 id="resultTitle">限定礼盒</h3>
        <p id="resultMeta">恭喜抽中</p>
        <p class="result-copy" data-i18n="resultCopy">
          恭喜抽中高人气奖励，现场视觉会更适合用户举起手机拍照分享。
        </p>
        <div class="dialog-actions">
          <button id="closeDialogButton" class="primary-button" data-i18n="drawAgain">再次抽取</button>
        </div>
      </div>
    </dialog>

    <template id="itemTemplate">
      <div class="item-row">
        <div class="item-name-display"></div>
        <label>
          <span class="sr-only">weight</span>
          <input class="item-weight" type="number" min="0" max="9999" />
        </label>
        <div class="item-share">0%</div>
        <button class="remove-button" type="button" aria-label="remove">×</button>
      </div>
    </template>

    <template id="blindboxPrizeTemplate">
      <div class="blindbox-prize-row">
        <label>
          <span class="sr-only">prize</span>
          <input class="blindbox-prize-name" type="text" maxlength="20" />
        </label>
        <label>
          <span class="sr-only">quantity</span>
          <input class="blindbox-prize-qty" type="number" min="0" max="999" />
        </label>
        <div class="blindbox-prize-share">0%</div>
        <button class="remove-button blindbox-remove" type="button" aria-label="remove">×</button>
      </div>
    </template>

    <template id="blindboxCellTemplate">
      <button class="blindbox-cell" type="button">
        <span class="blindbox-cell-glow"></span>
        <span class="blindbox-cell-box"></span>
        <span class="blindbox-cell-lid"></span>
        <span class="blindbox-cell-ribbon blindbox-cell-ribbon-vertical"></span>
        <span class="blindbox-cell-ribbon blindbox-cell-ribbon-horizontal"></span>
        <span class="blindbox-cell-bow-knot"></span>
        <span class="blindbox-cell-bow-loop blindbox-cell-bow-left"></span>
        <span class="blindbox-cell-bow-loop blindbox-cell-bow-right"></span>
        <span class="blindbox-cell-index"></span>
        <span class="blindbox-cell-name"></span>
      </button>
    </template>

    <script src="./script.js"></script>
  </body>
</html>
