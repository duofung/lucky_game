<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>幸运轮盘</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div class="brand-block">
          <div class="brand-badge">LUCKY SPIN</div>
          <div>
            <h1 data-i18n="brandTitle">幸运轮盘</h1>
            <p data-i18n="brandSubtitle">
              为线下活动与品牌互动设计的高颜值抽奖页面。
            </p>
          </div>
        </div>
        <div class="toolbar">
          <button class="ghost-chip active" data-lang="zh">中文</button>
          <button class="ghost-chip" data-lang="en">EN</button>
        </div>
      </header>

      <main class="layout">
        <section class="hero-panel">
          <div class="hero-copy">
            <div class="eyebrow" data-i18n="eyebrow">Lucky Wheel</div>
            <h2 data-i18n="heroTitle">把抽奖这件事，做得更漂亮一点。</h2>
            <p data-i18n="heroText">
              支持自定义奖项名称与分值，转盘动画和中奖弹窗更有仪式感，适合现场互动、礼品抽奖与品牌活动。
            </p>
            <div class="hero-metrics">
              <article>
                <strong>01</strong>
                <span data-i18n="metricOne">支持自定义奖项名称与分值</span>
              </article>
              <article>
                <strong>02</strong>
                <span data-i18n="metricTwo">旋转动效与结果弹窗更具仪式感</span>
              </article>
            </div>
          </div>

          <div class="content-grid">
            <section class="wheel-stage glass-panel">
              <div class="panel-header">
                <div>
                  <div class="section-label" data-i18n="livePreview">现场预览</div>
                  <h3 data-i18n="stageTitle">幸运轮盘</h3>
                </div>
                <button id="spinButton" class="primary-button" data-i18n="spinNow">开始抽奖</button>
              </div>

              <div class="wheel-stack">
                <div class="wheel-pointer"></div>
                <div class="wheel-frame">
                  <canvas id="wheelCanvas" width="640" height="640" aria-label="Lucky wheel"></canvas>
                </div>
              </div>

              <div class="stage-footer">
                <div class="current-result">
                  <span data-i18n="nextPrize">当前焦点奖项</span>
                  <strong id="focusedLabel">限定礼盒 · 30分</strong>
                </div>
                <button id="shuffleButton" class="secondary-button" data-i18n="shuffleOrder">随机排序</button>
              </div>
            </section>

            <section class="editor-panel glass-panel">
              <div class="panel-header">
                <div>
                  <div class="section-label" data-i18n="editorLabel">玩法编辑</div>
                  <h3 data-i18n="editorTitle">奖项配置</h3>
                </div>
                <button id="addItemButton" class="secondary-button" data-i18n="addItem">新增奖项</button>
              </div>

              <div class="editor-head">
                <span data-i18n="prizeName">奖项名称</span>
                <span data-i18n="prizeScore">分值</span>
              </div>
              <div id="itemList" class="item-list"></div>

              <div class="editor-actions">
                <button id="resetButton" class="ghost-button" data-i18n="resetDefault">恢复默认</button>
              </div>
            </section>
          </div>
        </section>
      </main>
    </div>

    <dialog id="resultDialog" class="result-dialog">
      <div class="result-card">
        <div class="result-confetti confetti-left"></div>
        <div class="result-confetti confetti-right"></div>
        <p class="result-tag" data-i18n="congratsTag">抽奖结果</p>
        <h3 id="resultTitle">限定礼盒</h3>
        <p id="resultMeta">获得 30 分</p>
        <p class="result-copy" data-i18n="resultCopy">
          恭喜抽中高人气奖励，现场视觉会更适合用户举起手机拍照分享。
        </p>
        <div class="dialog-actions">
          <button id="closeDialogButton" class="primary-button" data-i18n="drawAgain">再次抽取</button>
        </div>
      </div>
    </dialog>

    <template id="itemTemplate">
      <div class="item-row">
        <label>
          <span class="sr-only">label</span>
          <input class="item-name" type="text" maxlength="20" />
        </label>
        <label>
          <span class="sr-only">score</span>
          <input class="item-score" type="number" min="0" max="9999" />
        </label>
        <button class="remove-button" type="button" aria-label="remove">×</button>
      </div>
    </template>

    <script src="./script.js"></script>
  </body>
</html>
